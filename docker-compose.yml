services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats
      POSTGRES_DB: ats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats -d ats"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  localstack:
    # Pinned to v3 community: 'latest' now resolves to a paywalled build that
    # exits 55 without LOCALSTACK_AUTH_TOKEN. v3 still ships free S3.
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    volumes:
      - .localstack:/var/lib/localstack

volumes:
  postgres_data:
  redis_data:
