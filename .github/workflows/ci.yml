name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ats
          POSTGRES_PASSWORD: ats
          POSTGRES_DB: ats
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        working-directory: apps/api
        run: uv sync

      - name: Lint
        working-directory: apps/api
        run: uv run ruff check .

      - name: Migrate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://ats:ats@localhost:5432/ats
        run: uv run alembic upgrade head

      - name: Test
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://ats:ats@localhost:5432/ats
        run: uv run pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web build
